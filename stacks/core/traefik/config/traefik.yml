# Traefik static configuration
# https://doc.traefik.io/traefik/reference/static-configuration/file/

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /etc/traefik/acme/acme.json
      tlsChallenge: {}
  internal:
    acme:
      email: "${ACME_EMAIL}"
      storage: /etc/traefik/acme/internal.json
      tlsChallenge: {}

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy-frontend
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog:
  filters:
    statusCodes:
      - "400-499"
      - "500-599"

ping:
  entryPoint: web
