# =============================================================================
# Traefik - Reverse Proxy
# =============================================================================

name: traefik

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CONTAINER_ENGINE_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/dynamic:/etc/traefik/dynamic:ro
      - acme-data:/etc/traefik/acme
    environment:
      TZ: ${TZ:-Europe/Paris}
    networks:
      - proxy-frontend
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      # Dashboard
      - traefik.http.routers.traefik.rule=Host(`traefik.${BASE_DOMAIN:-localhost}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      # - traefik.http.routers.traefik.middlewares=auth@file
      # DNSZoner integration
      - dnszoner.enable=true
      - dnszoner.domain=traefik.${BASE_DOMAIN:-localhost}

volumes:
  acme-data:

networks:
  proxy-frontend:
    external: true
