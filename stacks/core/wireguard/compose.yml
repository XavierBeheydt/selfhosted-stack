name: wireguard

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "51820:51820/udp"
    volumes:
      - wg-data:/etc/wireguard
    environment:
      TZ: ${TZ:-Europe/Paris}
      WG_HOST: ${WG_HOST:?WG_HOST required}
      PASSWORD_HASH: ${WG_PASSWORD_HASH:?WG_PASSWORD_HASH required}
      WG_DEFAULT_DNS: ${WG_DEFAULT_DNS:-10.13.13.1}
      WG_ALLOWED_IPS: ${WG_ALLOWED_IPS:-10.13.13.0/24}
      WG_PERSISTENT_KEEPALIVE: 25
      PORT: 51821
      WG_PORT: 51820
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.wireguard.rule: "Host(`wg.${BASE_DOMAIN:?BASE_DOMAIN required}`)"
      traefik.http.routers.wireguard.entrypoints: websecure
      traefik.http.routers.wireguard.tls.certresolver: letsencrypt
      traefik.http.services.wireguard.loadbalancer.server.port: "51821"

volumes:
  wg-data:

networks:
  proxy:
    external: true
