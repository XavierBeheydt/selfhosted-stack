apiVersion: v1
kind: Service
metadata:
  name: coredns
  namespace: dns
spec:
  type: LoadBalancer
  selector:
    app: coredns
  ports:
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP

---
apiVersion: v1
kind: Service
metadata:
  name: dnszoner
  namespace: dns
spec:
  type: ClusterIP
  selector:
    app: dnszoner
  ports:
    - name: health
      port: 8080
      targetPort: health
