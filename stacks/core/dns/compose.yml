# =============================================================================
# DNS - CoreDNS + DNSZoner
# =============================================================================
# CoreDNS serves as the DNS server with dynamic zone management via DNSZoner.
# DNSZoner watches running containers for labels and generates zone files.

name: dns

services:
  coredns:
    image: coredns/coredns:latest
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile -dns.port ${DNS_PORT:-53}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    ports:
      - "${DNS_HOST:-0.0.0.0}:${DNS_PORT:-53}:${DNS_PORT:-53}/tcp"
      - "${DNS_HOST:-0.0.0.0}:${DNS_PORT:-53}:${DNS_PORT:-53}/udp"
    volumes:
      - ./config/Corefile:/etc/coredns/Corefile:ro
      - dns-zones:/etc/coredns/zones:ro
    environment:
      DNS_FORWARD_TO: "${DNS_FORWARD_TO:-tls://9.9.9.9 tls://149.112.112.112}"
      DNS_FORWARD_TLS_NAME: "${DNS_FORWARD_TLS_NAME:-dns.quad9.net}"
    networks:
      - proxy-frontend
      - dns-internal
    labels:
      - dnszoner.enable=true
      - dnszoner.domain=dns.${BASE_DOMAIN:-localhost}

  dnszoner:
    build:
      context: ./dnszoner
      dockerfile: Containerfile
    image: localhost/dnszoner:latest
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - ${CONTAINER_ENGINE_SOCKET:-/var/run/docker.sock}:/var/run/container_engine.sock:ro
      - dns-zones:/etc/coredns/zones:rw
    environment:
      CONTAINER_ENGINE_SOCKET: "http+unix:///var/run/container_engine.sock"
      DNSZONER_ZONE_DIR: "/etc/coredns/zones"
      DNSZONER_BASE_DOMAIN: "${BASE_DOMAIN:-localhost}"
      DNSZONER_REFRESH_INTERVAL: "${DNSZONER_REFRESH_INTERVAL:-5}"
      DNSZONER_HOST: "0.0.0.0"
      DNSZONER_PORT: "8080"
    depends_on:
      coredns:
        condition: service_healthy
    networks:
      - dns-internal

volumes:
  dns-zones:

networks:
  proxy-frontend:
    external: true
  dns-internal:
    driver: bridge
