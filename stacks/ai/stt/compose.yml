name: stt

services:
  app:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: stt
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      TZ: ${TZ:-Europe/Paris}
      WHISPER__MODEL: "Systran/faster-whisper-small"
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.stt.rule: "Host(`stt.${BASE_DOMAIN:?BASE_DOMAIN required}`)"
      traefik.http.routers.stt.entrypoints: websecure
      traefik.http.routers.stt.tls.certresolver: letsencrypt
      traefik.http.services.stt.loadbalancer.server.port: "8000"

networks:
  proxy:
    external: true
