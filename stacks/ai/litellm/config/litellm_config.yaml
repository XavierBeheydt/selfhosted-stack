# LiteLLM Proxy Configuration
# https://docs.litellm.ai/docs/proxy/configs
#
# This config defines which LLM models are available through the proxy.
# All consumers (Open WebUI, OpenClaw, n8n) hit this single endpoint.

model_list:
  # --- Local Ollama models (GPU inference) ---
  - model_name: llama3
    litellm_params:
      model: ollama/llama3
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: codellama
    litellm_params:
      model: ollama/codellama
      api_base: os.environ/OLLAMA_API_BASE

  # --- OpenAI (optional, uncomment if you have an API key) ---
  # - model_name: gpt-4o
  #   litellm_params:
  #     model: openai/gpt-4o
  #     api_key: os.environ/OPENAI_API_KEY

  # --- Anthropic (optional, uncomment if you have an API key) ---
  # - model_name: claude-sonnet
  #   litellm_params:
  #     model: anthropic/claude-sonnet-4-20250514
  #     api_key: os.environ/ANTHROPIC_API_KEY

litellm_settings:
  # Drop unsupported params instead of erroring
  drop_params: true
  # Retry failed requests
  num_retries: 3
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
