# LiteLLM — Unified LLM API Gateway
# https://docs.litellm.ai/
#
# Provides a single OpenAI-compatible endpoint for all AI consumers
# (Open WebUI, OpenClaw, n8n) with caching, cost tracking, and fallbacks.

name: litellm

services:
  litellm:
    image: ghcr.io/berriai/litellm-database:main-stable
    container_name: litellm
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@litellm-db:5432/${POSTGRES_DB:-litellm}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY (must start with sk-)}"
      STORE_MODEL_IN_DB: "True"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:-http://ollama:11434}"
    env_file:
      - .env
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - litellm-internal
      - proxy-frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.litellm.rule=Host(`${LITELLM_DOMAIN:-litellm.local}`)"
      - "traefik.http.routers.litellm.entrypoints=websecure"
      - "traefik.http.routers.litellm.tls=true"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"
      - "dnszoner.enable=true"
      - "dnszoner.domain=${LITELLM_DOMAIN:-litellm.local}"

  litellm-db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-litellm} -U ${POSTGRES_USER:-litellm}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - litellm-internal

volumes:
  litellm-db-data:

networks:
  litellm-internal:
    driver: bridge
  proxy-frontend:
    external: true
