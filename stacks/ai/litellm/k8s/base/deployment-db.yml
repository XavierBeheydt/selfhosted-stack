apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-db
  namespace: litellm
  labels:
    app: litellm-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: litellm-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: litellm
            - name: POSTGRES_USER
              value: litellm
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-d", "litellm", "-U", "litellm"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: litellm-db-pvc
