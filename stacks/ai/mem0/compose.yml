# Mem0 — Persistent AI Memory Layer
# https://docs.mem0.ai/
#
# Provides long-term memory for AI services. Stores user preferences,
# conversation history, and traits. Shared across Open WebUI, OpenClaw, and n8n.

name: mem0

services:
  mem0:
    image: mem0/mem0-api-server:latest
    container_name: mem0
    restart: unless-stopped
    ports:
      - "${MEM0_PORT:-8888}:8000"
    env_file:
      - .env
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE:-http://ollama:11434}"
      POSTGRES_HOST: mem0-pgvector
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-mem0}
      POSTGRES_USER: ${POSTGRES_USER:-mem0}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_COLLECTION_NAME: ${POSTGRES_COLLECTION_NAME:-memories}
      NEO4J_URI: "bolt://mem0-neo4j:7687"
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-mem0graph}
    volumes:
      - mem0-history:/app/history
    depends_on:
      mem0-pgvector:
        condition: service_healthy
      mem0-neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mem0-internal
      - proxy-frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mem0.rule=Host(`${MEM0_DOMAIN:-mem0.local}`)"
      - "traefik.http.routers.mem0.entrypoints=websecure"
      - "traefik.http.routers.mem0.tls=true"
      - "traefik.http.services.mem0.loadbalancer.server.port=8000"
      - "dnszoner.enable=true"
      - "dnszoner.domain=${MEM0_DOMAIN:-mem0.local}"

  mem0-pgvector:
    image: ankane/pgvector:v0.5.1
    container_name: mem0-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mem0}
      POSTGRES_USER: ${POSTGRES_USER:-mem0}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - mem0-pgvector-data:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${POSTGRES_DB:-mem0}", "-U", "${POSTGRES_USER:-mem0}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mem0-internal

  mem0-neo4j:
    image: neo4j:5.26.4
    container_name: mem0-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-mem0graph}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    volumes:
      - mem0-neo4j-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - mem0-internal

volumes:
  mem0-history:
  mem0-pgvector-data:
  mem0-neo4j-data:

networks:
  mem0-internal:
    driver: bridge
  proxy-frontend:
    external: true
