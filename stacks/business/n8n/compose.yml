name: n8n

services:
  app:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      TZ: ${TZ:-Europe/Paris}
      N8N_HOST: "n8n.${BASE_DOMAIN:?BASE_DOMAIN required}"
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      WEBHOOK_URL: "https://n8n.${BASE_DOMAIN}"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:?N8N_DB_PASSWORD required}
    networks:
      - proxy
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.n8n.rule: "Host(`n8n.${BASE_DOMAIN}`)"
      traefik.http.routers.n8n.entrypoints: websecure
      traefik.http.routers.n8n.tls.certresolver: letsencrypt
      traefik.http.services.n8n.loadbalancer.server.port: "5678"
      dnszoner.enable: "true"
      dnszoner.domain: "n8n.${BASE_DOMAIN}"

  db:
    image: postgres:16-alpine
    container_name: n8n-db
    restart: unless-stopped
    volumes:
      - n8n-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${N8N_DB_NAME:-n8n}
      POSTGRES_USER: ${N8N_DB_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?N8N_DB_PASSWORD required}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n}"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  n8n-data:
  n8n-db:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
