name: dolibarr

services:
  app:
    image: dolibarr/dolibarr:22
    container_name: dolibarr
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - dolibarr-docs:/var/www/documents
      - dolibarr-custom:/var/www/html/custom
    environment:
      TZ: ${TZ:-Europe/Paris}
      DOLI_DB_HOST: db
      DOLI_DB_NAME: ${DOLI_DB_NAME:-dolidb}
      DOLI_DB_USER: ${DOLI_DB_USER:-dolidbuser}
      DOLI_DB_PASSWORD: ${DOLI_DB_PASSWORD:?DOLI_DB_PASSWORD required}
      DOLI_URL_ROOT: "https://erp.${BASE_DOMAIN:?BASE_DOMAIN required}"
      DOLI_ADMIN_LOGIN: ${DOLI_ADMIN_LOGIN:-admin}
      DOLI_ADMIN_PASSWORD: ${DOLI_ADMIN_PASSWORD:?DOLI_ADMIN_PASSWORD required}
      DOLI_INSTALL_AUTO: ${DOLI_INSTALL_AUTO:-1}
      DOLI_INIT_DEMO: ${DOLI_INIT_DEMO:-0}
      DOLI_CRON: ${DOLI_CRON:-0}
      DOLI_CRON_KEY: ${DOLI_CRON_KEY:-changeme}
      DOLI_COMPANY_NAME: ${DOLI_COMPANY_NAME:-MyCompany}
      WWW_USER_ID: ${WWW_USER_ID:-1000}
      WWW_GROUP_ID: ${WWW_GROUP_ID:-1000}
      PHP_INI_DATE_TIMEZONE: ${TZ:-Europe/Paris}
    networks:
      - proxy
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.dolibarr.rule: "Host(`erp.${BASE_DOMAIN}`)"
      traefik.http.routers.dolibarr.entrypoints: websecure
      traefik.http.routers.dolibarr.tls.certresolver: letsencrypt
      traefik.http.services.dolibarr.loadbalancer.server.port: "80"
      dnszoner.enable: "true"
      dnszoner.domain: "erp.${BASE_DOMAIN}"

  db:
    image: mariadb:lts
    container_name: dolibarr-db
    restart: unless-stopped
    command: --character_set_client=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - dolibarr-db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DOLI_DB_ROOT_PASSWORD:?DOLI_DB_ROOT_PASSWORD required}
      MYSQL_DATABASE: ${DOLI_DB_NAME:-dolidb}
      MYSQL_USER: ${DOLI_DB_USER:-dolidbuser}
      MYSQL_PASSWORD: ${DOLI_DB_PASSWORD:?DOLI_DB_PASSWORD required}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  dolibarr-db:
  dolibarr-docs:
  dolibarr-custom:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
